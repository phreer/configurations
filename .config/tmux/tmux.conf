set-option -g default-shell /bin/zsh

# Setup clipboard support, reference: https://github.com/tmux/tmux/wiki/Clipboard
# set -s copy-command 'wl-copy'
# For X11
# set -s copy-command 'xsel -i'
set -g set-clipboard on

bind -T copy-mode    C-w               send -X copy-selection-and-cancel
bind -T copy-mode    M-w               send -X copy-selection-and-cancel
bind -T copy-mode    MouseDragEnd1Pane send -X copy-selection-and-cancel

bind -T copy-mode-vi v                 send -X begin-selection
bind -T copy-mode-vi y                 send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"

set -g history-limit 40960
set -s escape-time 0
set -g status-interval 0

